<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1055 1491" width="1055" height="1491" style="background:#fff; font-family: 'Nunito', 'Segoe UI', sans-serif;">
  <defs>
    <style>
      .t-title { font-size: 44px; font-weight: 900; fill: #111; letter-spacing: 1px; }
      .t-nro { font-size: 24px; font-weight: 700; fill: #333; }
      .t-label { font-size: 22px; font-weight: 700; fill: #831843; }
      .t-sec { font-size: 28px; font-weight: 800; fill: #111; }
      .t-th { font-size: 20px; font-weight: 800; fill: #BE185D; }
      .t-cb { font-size: 22px; font-weight: 600; fill: #111; }
      .t-tot { font-size: 28px; font-weight: 800; fill: #fff; }
      .t-firm { font-size: 18px; font-weight: 600; fill: #555; }
      
      .box-pink { fill: #FDF2F8; stroke: #FBCFE8; stroke-width: 2px; }
      .box-white { fill: #fff; stroke: #FBCFE8; stroke-width: 2px; }
      .box-th { fill: #FCE7F3; stroke: #FBCFE8; stroke-width: 2px; }
      .box-tot { fill: #EC4899; }
      .line { stroke: #FBCFE8; stroke-width: 2px; }
      .line-dash { stroke: #9CA3AF; stroke-width: 2px; stroke-dasharray: 6 6; }
      
      .inp-bg { fill: #fff; stroke: #FBCFE8; stroke-width: 1.5px; rx: 6px; }
    </style>
  </defs>

  <!-- HEADER RIGHT -->
  <text x="1005" y="140" text-anchor="end" class="t-title">NOTA DE PEDIDO</text>
  <text x="880" y="200" text-anchor="end" class="t-nro">Nro.</text>
  <line x1="900" y1="200" x2="1005" y2="200" stroke="#ccc" stroke-width="2" />

  <!-- DATOS CLIENTE -->
  <rect x="50" y="250" width="955" height="220" rx="12" class="box-pink" />
  
  <text x="80" y="310" class="t-label">Nombre o Razón Social:</text>
  <rect x="350" y="278" width="620" height="42" class="inp-bg" />

  <text x="80" y="375" class="t-label">Teléfono:</text>
  <rect x="200" y="343" width="770" height="42" class="inp-bg" />

  <text x="80" y="440" class="t-label">Fecha:</text>
  <rect x="170" y="408" width="800" height="42" class="inp-bg" />

  <!-- DETALLES (TABLA) -->
  <text x="50" y="530" class="t-sec">Detalles</text>
  
  <!-- CABECERA DE TABLA -->
  <rect x="50" y="550" width="955" height="50" class="box-th" />
  <text x="125" y="583" text-anchor="middle" class="t-th">CANT.</text>
  <text x="450" y="583" text-anchor="middle" class="t-th">DESCRIPCIÓN</text>
  <text x="750" y="583" text-anchor="middle" class="t-th">P. UNI.</text>
  <text x="915" y="583" text-anchor="middle" class="t-th">TOTAL</text>

  <!-- CUERPO DE TABLA (10 FILAS) -->
  <rect x="50" y="600" width="955" height="550" class="box-white" />
  
  <!-- Líneas verticales -->
  <line x1="200" y1="550" x2="200" y2="1150" class="line" />
  <line x1="700" y1="550" x2="700" y2="1150" class="line" />
  <line x1="830" y1="550" x2="830" y2="1150" class="line" />

  <!-- Líneas horizontales -->
  <line x1="50" y1="655" x2="1005" y2="655" class="line" />
  <line x1="50" y1="710" x2="1005" y2="710" class="line" />
  <line x1="50" y1="765" x2="1005" y2="765" class="line" />
  <line x1="50" y1="820" x2="1005" y2="820" class="line" />
  <line x1="50" y1="875" x2="1005" y2="875" class="line" />
  <line x1="50" y1="930" x2="1005" y2="930" class="line" />
  <line x1="50" y1="985" x2="1005" y2="985" class="line" />
  <line x1="50" y1="1040" x2="1005" y2="1040" class="line" />
  <line x1="50" y1="1095" x2="1005" y2="1095" class="line" />

  <!-- FOOTER PAGO Y TOTAL -->
  <rect x="50" y="1190" width="600" height="90" rx="10" class="box-white" />
  <text x="80" y="1245" class="t-label">Forma de Pago:</text>
  
  <rect x="270" y="1225" width="24" height="24" rx="4" fill="#fff" stroke="#999" stroke-width="2"/>
  <text x="305" y="1245" class="t-cb">Efectivo</text>
  
  <rect x="410" y="1225" width="24" height="24" rx="4" fill="#fff" stroke="#999" stroke-width="2"/>
  <text x="445" y="1245" class="t-cb">Transf.</text>
  
  <rect x="550" y="1225" width="24" height="24" rx="4" fill="#fff" stroke="#999" stroke-width="2"/>
  <text x="585" y="1245" class="t-cb">QR</text>

  <rect x="700" y="1190" width="305" height="90" rx="15" class="box-tot" />
  <text x="740" y="1246" class="t-tot">TOTAL</text>

  <!-- FIRMAS -->
  <line x1="150" y1="1410" x2="450" y2="1410" class="line-dash" />
  <text x="300" y="1440" text-anchor="middle" class="t-firm">Firma del Cliente</text>

  <line x1="600" y1="1410" x2="900" y2="1410" class="line-dash" />
  <text x="750" y="1440" text-anchor="middle" class="t-firm">Firma de Propietario</text>

</svg>
